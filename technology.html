<script>
let currentLang = localStorage.getItem("siteLang") || "zh";

function applyLang() {
  document.documentElement.lang =
    currentLang === "zh" ? "zh-Hant" :
    currentLang === "cn" ? "zh-Hans" :
    "en";

  document.querySelectorAll("[data-zh]").forEach(el => {
    el.textContent = el.getAttribute(`data-${currentLang}`);
  });

  document.querySelectorAll(".lang-link").forEach(btn => {
    btn.classList.toggle("active-lang", btn.dataset.langOption === currentLang);
  });
}

function setLang(lang){
  currentLang = lang;
  localStorage.setItem("siteLang", lang);
  applyLang();
}

applyLang();
</script>
